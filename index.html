<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jagathish Cloud</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:450px;
background:#111827;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:10px;
color:#38bdf8;
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#94a3b8;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:14px;
border:none;
cursor:pointer;
background:#1e293b;
color:white;
}

.active{
background:#38bdf8!important;
color:black!important;
font-weight:bold;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

.main-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

.main-btn:hover{
opacity:.9;
}

.hidden{
display:none;
}

.dashboard{
width:100%;
max-width:900px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logout-btn{
background:crimson;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
}

.info{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#111827;
padding:15px 20px;
border-radius:10px;
z-index:9999;
border-left:5px solid #38bdf8;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="card" id="authPage">

<h1>Jagathish Cloud</h1>

<p class="subtitle">
Secure File Manager
</p>

<div class="tabs">

<button
id="loginTab"
class="active">
Login
</button>

<button
id="signupTab">
Sign Up
</button>

</div>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button
id="authBtn"
class="main-btn">
Login
</button>

</div>


<!-- DASHBOARD -->

<div
class="card dashboard hidden"
id="dashboardPage">

<div class="topbar">

<div>

<h1>Dashboard</h1>

<p id="welcomeEmail">
Loading...
</p>

</div>

<button
class="logout-btn"
onclick="logout()">
Logout
</button>

</div>

<div class="info">

<h3>
<div class="info">

<h3>Upload File</h3>

<br>

<input
type="file"
id="fileInput">

<br><br>

<button
class="main-btn"
onclick="uploadFile()">
Upload
</button>

<br><br>

<div id="dropZone"
style="
border:2px dashed #38bdf8;
padding:40px;
text-align:center;
border-radius:15px;
margin-top:15px;
">
Drag File Here
</div>

<br>

<h3>Stored Files</h3>

<br>

<div id="fileList">

Loading files...

</div>

</div>
</h3>

<br>

<p>

✅ Login Working

</p>

<br>

<p>

✅ Signup Working

</p>

<br>

<p>

✅ Session Restore

</p>

<br>

<p>

🚀 File Manager Next

</p>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<script>

let mode = "login";

const authPage =
document.getElementById("authPage");

const dashboardPage =
document.getElementById("dashboardPage");

const loginTab =
document.getElementById("loginTab");

const signupTab =
document.getElementById("signupTab");

const authBtn =
document.getElementById("authBtn");


loginTab.onclick = () => {

mode = "login";

loginTab.classList.add("active");

signupTab.classList.remove("active");

authBtn.innerText = "Login";

};


signupTab.onclick = () => {

mode = "signup";

signupTab.classList.add("active");

loginTab.classList.remove("active");

authBtn.innerText =
"Create Account";

};


function popup(message){

const p =
document.createElement("div");

p.className="popup";

p.innerText=message;

document.body.appendChild(p);

setTimeout(()=>{

p.remove();

},3000);

}


authBtn.onclick = async () => {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(!email || !password){

popup(
"Enter email and password"
);

return;

}


if(mode==="signup"){

authBtn.innerText =
"Creating...";

const {data,error} =
await supabaseClient.auth.signUp({

email,
password

});


authBtn.innerText =
"Create Account";


if(error){

popup(error.message);

return;

}


await supabaseClient
.from("profiles")
.insert([{

id:data.user.id,
email:email

}]);


popup(
"Account created successfully. Please login."
);

mode="login";

loginTab.click();

return;

}


authBtn.innerText =
"Logging In...";


const {data,error} =
await supabaseClient
.auth
.signInWithPassword({

email,
password

});


authBtn.innerText =
"Login";


if(error){

popup(
"Invalid email or password"
);

return;

}


showDashboard(
data.user.email
);

};


async function showDashboard(email){

authPage.classList.add(
"hidden"
);

dashboardPage.classList.remove(
"hidden"
);

document.getElementById(
"welcomeEmail"
).innerText = email;
loadFiles();

}


async function logout(){

await supabaseClient.auth.signOut();

location.reload();

}


async function checkSession(){

const {

data:{
session
}

} = await supabaseClient
.auth
.getSession();


if(session){

showDashboard(
session.user.email
);

}

}

checkSession();

async function uploadFile(){

const file =
document.getElementById(
"fileInput"
).files[0];

if(!file){

popup("Choose file");

return;

}

const user =
(
await supabaseClient
.auth
.getUser()
).data.user;

const path =
`${user.id}/${Date.now()}_${file.name}`;

const { error } =
await supabaseClient
.storage
.from("files")
.upload(
path,
file
);

if(error){

popup(error.message);

return;

}

popup(
"Upload Success"
);

loadFiles();

}



async function loadFiles(){

const user =
(
await supabaseClient
.auth
.getUser()
).data.user;

const {

data,
error

} =
await supabaseClient
.storage
.from("files")
.list(
user.id
);

const list =
document.getElementById(
"fileList"
);

if(error){

list.innerHTML =
"Cannot load files";

return;

}

if(data.length===0){

list.innerHTML =
"No files";

return;

}

list.innerHTML="";

data.forEach(file=>{

const item =
document.createElement(
"div"
);

item.style.marginBottom=
"12px";

item.style.cursor=
"pointer";

item.innerHTML=
"📄 " + file.name;

item.onclick =
()=>downloadFile(
user.id,
file.name
);

list.appendChild(item);

});

}



async function downloadFile(
folder,
fileName
){

const {

data

} =
await supabaseClient
.storage
.from("files")
.createSignedUrl(
`${folder}/${fileName}`,
60
);

window.open(
data.signedUrl,
"_blank"
);

}

</script>

</body>
</html>
