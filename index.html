<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jagathish Cloud</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: #0f172a;
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 1100px;
}

.card {
  background: #111827;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

h1 {
  text-align: center;
  margin-bottom: 10px;
  font-size: 36px;
  color: #38bdf8;
}

p.subtitle {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 30px;
}

.hidden {
  display: none;
}

.auth-box {
  max-width: 420px;
  margin: auto;
}

.tabs {
  display: flex;
  margin-bottom: 20px;
  border-radius: 10px;
  overflow: hidden;
}

.tabs button {
  flex: 1;
  padding: 14px;
  border: none;
  cursor: pointer;
  background: #1e293b;
  color: white;
  font-size: 16px;
}

.tabs button.active {
  background: #38bdf8;
  color: black;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 15px;
}

.main-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.main-btn:hover {
  opacity: 0.85;
}

.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 15px;
}

.logout-btn {
  background: crimson;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}

.upload-box {
  border: 2px dashed #38bdf8;
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  margin-bottom: 30px;
  background: #0f172a;
}

.upload-box h2 {
  margin-bottom: 15px;
  color: #38bdf8;
}

.upload-box input {
  background: transparent;
  margin-top: 10px;
}

.file-list {
  background: #0f172a;
  border-radius: 20px;
  padding: 20px;
}

.file-list h2 {
  margin-bottom: 20px;
  color: #38bdf8;
}

.file-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 10px;
}

.file-info {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.file-name {
  font-size: 16px;
  font-weight: bold;
}

.file-size {
  color: #94a3b8;
  font-size: 14px;
}

.download-btn {
  background: #22c55e;
  color: black;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.status {
  margin-top: 15px;
  text-align: center;
  color: #22c55e;
}

@media (max-width: 700px) {
  .dashboard-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .file-item {
    flex-direction: column;
    align-items: flex-start;
  }

  .download-btn {
    width: 100%;
  }
}

  </style>
</head>
<body><div class="container">  <!-- LOGIN PAGE -->  <div class="card auth-box" id="authPage">
    <h1>Jagathish Cloud</h1>
    <p class="subtitle">Private File Manager</p><div class="tabs">
  <button class="active" id="loginTab">Login</button>
  <button id="signupTab">Sign Up</button>
</div>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button class="main-btn" id="authBtn">Login</button>

<p class="status" id="authStatus"></p>

  </div>  <!-- DASHBOARD -->  <div class="card hidden" id="dashboardPage"><div class="dashboard-header">
  <div>
    <h1>Jagathish Cloud</h1>
    <p class="subtitle">Upload and manage files anywhere</p>
  </div>

  <button class="logout-btn" id="logoutBtn">Logout</button>
</div>


<!-- UPLOAD SECTION -->
<div class="upload-box">
  <h2>Upload Files</h2>
  <p>Select files from your device</p>

  <input type="file" id="fileInput" multiple>

  <button class="main-btn" style="margin-top:20px;" id="uploadBtn">
    Upload File
  </button>

  <p class="status" id="uploadStatus"></p>
</div>


<!-- FILE LIST -->
<div class="file-list">
  <h2>Stored Files</h2>

  <div id="filesContainer"></div>
</div>

  </div>
</div><script>

  // ==========================================
  // DEMO FRONTEND ONLY
  // Backend logic will be connected later
  // ==========================================


  const authPage = document.getElementById('authPage');
  const dashboardPage = document.getElementById('dashboardPage');

  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');

  const authBtn = document.getElementById('authBtn');
  const authStatus = document.getElementById('authStatus');

  const uploadBtn = document.getElementById('uploadBtn');
  const uploadStatus = document.getElementById('uploadStatus');

  const filesContainer = document.getElementById('filesContainer');

  const logoutBtn = document.getElementById('logoutBtn');


  let currentMode = 'login';


  // ==========================================
  // TAB SWITCH
  // ==========================================

  loginTab.addEventListener('click', () => {
    currentMode = 'login';
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
    authBtn.innerText = 'Login';
    authStatus.innerText = '';
  });


  signupTab.addEventListener('click', () => {
    currentMode = 'signup';
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
    authBtn.innerText = 'Create Account';
    authStatus.innerText = '';
  });


  // ==========================================
  // DEMO LOGIN / SIGNUP
  // ==========================================

  authBtn.addEventListener('click', () => {

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email || !password) {
      authStatus.innerText = 'Please enter email and password';
      return;
    }

    if (currentMode === 'signup') {
      localStorage.setItem('cloudUser', JSON.stringify({ email, password }));
      authStatus.innerText = 'Account created successfully';
      return;
    }

    const storedUser = JSON.parse(localStorage.getItem('cloudUser'));

    if (!storedUser) {
      authStatus.innerText = 'No account found';
      return;
    }

    if (storedUser.email === email && storedUser.password === password) {
      authPage.classList.add('hidden');
      dashboardPage.classList.remove('hidden');
      loadFiles();
    } else {
      authStatus.innerText = 'Invalid credentials';
    }

  });


  // ==========================================
  // DEMO FILE DATABASE
  // ==========================================

  let files = [
    {
      name: 'project_notes.pdf',
      size: '2.1 MB'
    },
    {
      name: 'vacation_photo.jpg',
      size: '5.4 MB'
    },
    {
      name: 'music_track.mp3',
      size: '7.9 MB'
    }
  ];


  // ==========================================
  // LOAD FILES
  // ==========================================

  function loadFiles() {

    filesContainer.innerHTML = '';

    files.forEach((file, index) => {

      const item = document.createElement('div');
      item.className = 'file-item';

      item.innerHTML = `
        <div class="file-info">
          <span class="file-name">${file.name}</span>
          <span class="file-size">${file.size}</span>
        </div>

        <button class="download-btn" onclick="downloadFile(${index})">
          Download
        </button>
      `;

      filesContainer.appendChild(item);
    });
  }


  // ==========================================
  // DEMO UPLOAD
  // ==========================================

  uploadBtn.addEventListener('click', () => {

    const input = document.getElementById('fileInput');

    if (!input.files.length) {
      uploadStatus.innerText = 'Please select a file';
      return;
    }

    Array.from(input.files).forEach(file => {

      files.push({
        name: file.name,
        size: formatSize(file.size)
      });

    });

    loadFiles();

    uploadStatus.innerText = 'Files uploaded successfully';

    input.value = '';
  });


  // ==========================================
  // DEMO DOWNLOAD
  // ==========================================

  function downloadFile(index) {

    const file = files[index];

    alert('Later backend will download: ' + file.name);
  }


  // ==========================================
  // FILE SIZE FORMATTER
  // ==========================================

  function formatSize(bytes) {

    if (bytes < 1024) return bytes + ' B';

    else if (bytes < 1048576)
      return (bytes / 1024).toFixed(1) + ' KB';

    else
      return (bytes / 1048576).toFixed(1) + ' MB';
  }


  // ==========================================
  // LOGOUT
  // ==========================================

  logoutBtn.addEventListener('click', () => {

    dashboardPage.classList.add('hidden');
    authPage.classList.remove('hidden');

  });

</script></body>
</html>
