<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jagathish Cloud</title>

<link rel="stylesheet" href="styles.css">
<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
<div class="bg-glow"></div>
<div class="card" id="authPage">

    <h1>☁ Jagathish Cloud</h1>

    <p class="subtitle">
        Secure File Manager
    </p>

    <div class="tabs">

        <button id="loginTab" class="active">
            Login
        </button>

        <button id="signupTab">
            Sign Up
        </button>

    </div>

    <input
    type="email"
    id="email"
    placeholder="Email">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <button
    id="authBtn"
    class="main-btn">
        Login
    </button>

</div>


<div
class="dashboard hidden"
id="dashboardPage">

    <div class="topbar">

        <div>

            <h1>
                Jagathish Cloud
            </h1>

            <p id="welcomeEmail">
                Loading...
            </p>

        </div>

        <button
        class="logout-btn"
        onclick="logout()">
            Logout
        </button>

    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <h3>Total Files</h3>

            <div
            class="stat-value"
            id="totalFiles">
                0
            </div>

        </div>

        <div class="stat-card">

            <h3>Storage Used</h3>

            <div
            class="stat-value"
            id="totalSize">
                0 MB
            </div>

        </div>

        <div class="stat-card">

            <h3>Database Sync</h3>

            <div
            class="stat-value"
            id="dbFiles">
                0
            </div>

        </div>

    </div>

    <div class="upload-card">

        <h3>Upload File</h3>

        <input
        type="file"
        id="fileInput">

        <button
        class="main-btn"
        onclick="uploadFile()">
            Upload File
        </button>

        <div
        id="progressContainer"
        style="display:none;">

            <div id="progressBar">
                0%
            </div>

        </div>

        <div id="dropZone">
            ☁ Drag & Drop Files Here
        </div>

    </div>

    <div class="files-card">

        <h3>Stored Files</h3>

        <div id="fileList">
            Loading files...
        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<script>

let mode = "login";

const authPage =
document.getElementById("authPage");

const dashboardPage =
document.getElementById("dashboardPage");

const loginTab =
document.getElementById("loginTab");

const signupTab =
document.getElementById("signupTab");

const authBtn =
document.getElementById("authBtn");


loginTab.onclick = () => {

mode = "login";

loginTab.classList.add("active");

signupTab.classList.remove("active");

authBtn.innerText = "Login";

};


signupTab.onclick = () => {

mode = "signup";

signupTab.classList.add("active");

loginTab.classList.remove("active");

authBtn.innerText =
"Create Account";

};


function popup(message){

const p =
document.createElement("div");

p.className="popup";

p.innerText=message;

document.body.appendChild(p);

setTimeout(()=>{

p.remove();

},3000);

}


authBtn.onclick = async () => {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(!email || !password){

popup(
"Enter email and password"
);

return;

}


if(mode==="signup"){

authBtn.innerText =
"Creating...";

const {data,error} =
await supabaseClient.auth.signUp({

email,
password

});


authBtn.innerText =
"Create Account";


if(error){

popup(error.message);

return;

}


await supabaseClient
.from("profiles")
.insert([{

id:data.user.id,
email:email

}]);


popup(
"Account created successfully. Please login."
);

mode="login";

loginTab.click();

return;

}


authBtn.innerText =
"Logging In...";


const {data,error} =
await supabaseClient
.auth
.signInWithPassword({

email,
password

});


authBtn.innerText =
"Login";


if(error){

popup(
"Invalid email or password"
);

return;

}


showDashboard(
data.user.email
);

};


async function showDashboard(email){

authPage.classList.add(
"hidden"
);

dashboardPage.classList.remove(
"hidden"
);

document.getElementById(
"welcomeEmail"
).innerText = email;
loadFiles();
loadMetadataCount();

}


async function logout(){

await supabaseClient.auth.signOut();

location.reload();

}


async function checkSession(){

const {

data:{
session
}

} = await supabaseClient
.auth
.getSession();


if(session){

showDashboard(
session.user.email
);

}

}

checkSession();

async function uploadFile(){

const file =
document.getElementById("fileInput").files[0];

if(!file){
    popup("Choose file");
    return;
}

const user =
(await supabaseClient.auth.getUser()).data.user;

const path =
`${user.id}/${Date.now()}_${file.name}`;

const { error } =
await supabaseClient
.storage
.from("files")
.upload(path,file);

if(error){
    popup(error.message);
    return;
}

popup("Upload Success");

loadFiles();
loadMetadataCount();
}

async function downloadFile(folder, fileName) {

    const path = `${folder}/${fileName}`;

    const { data, error } =
    await supabaseClient.storage
    .from("files")
    .download(path);

    if (error) {
        alert(error.message);
        console.error(error);
        return;
    }

    const url =
    window.URL.createObjectURL(data);

    const a =
    document.createElement("a");

    a.href = url;
    a.download = fileName;

    document.body.appendChild(a);

    a.click();

    a.remove();

    window.URL.revokeObjectURL(url);
}

async function previewFile(
folder,
fileName
){

const path =
`${folder}/${fileName}`;

const {
data,
error

} =
await supabaseClient
.storage
.from("files")
.createSignedUrl(
path,
300
);

if(error){

popup(error.message);

return;

}

window.open(
data.signedUrl,
"_blank"
);

}
async function loadFiles(){

const user =
(
await supabaseClient
.auth
.getUser()
).data.user;

const {
data,
error
}
=
await supabaseClient
.storage
.from("files")
.list(user.id);

const list =
document.getElementById("fileList");

if(error){

list.innerHTML =
"Cannot load files";

return;

}

if(data.length===0){

list.innerHTML =
`
<div class="file-card">
No files uploaded yet
</div>
`;

return;

}

data.sort(
(a,b)=>
b.name.localeCompare(a.name)
);

list.innerHTML="";

let totalFiles = 0;
let totalBytes = 0;

data.forEach(file=>{

totalFiles++;

if(
file.metadata &&
file.metadata.size
){
totalBytes +=
file.metadata.size;
}

const cleanName =
file.name.replace(
/^\d+_/,
""
);

let icon = "📄";

if(
/\.(jpg|jpeg|png|gif|webp)$/i
.test(cleanName)
)
icon="🖼️";

else if(
/\.(pdf)$/i
.test(cleanName)
)
icon="📕";

else if(
/\.(doc|docx)$/i
.test(cleanName)
)
icon="📝";

else if(
/\.(zip|rar|7z)$/i
.test(cleanName)
)
icon="🗜️";

else if(
/\.(mp4|avi|mkv)$/i
.test(cleanName)
)
icon="🎥";

else if(
/\.(mp3|wav)$/i
.test(cleanName)
)
icon="🎵";

const row =
document.createElement("div");

row.className =
"file-card";

const info =
document.createElement("div");

info.className =
"file-info";

const name =
document.createElement("div");

name.innerHTML =
`
<div>
<strong>
${icon} ${cleanName}
</strong>
</div>
`;

info.appendChild(name);

const actions =
document.createElement("div");

actions.className =
"file-actions";

const previewBtn =
document.createElement("button");

previewBtn.innerHTML =
"👁 Preview";

previewBtn.onclick = () =>
previewFile(
user.id,
file.name
);

const downloadBtn =
document.createElement("button");

downloadBtn.innerHTML =
"⬇ Download";

downloadBtn.onclick = () =>
downloadFile(
user.id,
file.name
);

const deleteBtn =
document.createElement("button");

deleteBtn.innerHTML =
"🗑 Delete";

deleteBtn.className =
"delete-btn";

deleteBtn.onclick =
async()=>{

if(
!confirm(
"Delete file?"
)
)
return;

const { error } =
await supabaseClient
.storage
.from("files")
.remove([
`${user.id}/${file.name}`
]);

if(error){

popup(
error.message
);

return;

}

popup(
"File Deleted"
);

loadFiles();

loadMetadataCount();

};

actions.appendChild(
previewBtn
);

actions.appendChild(
downloadBtn
);

actions.appendChild(
deleteBtn
);

row.appendChild(info);

row.appendChild(actions);

list.appendChild(row);

});

document.getElementById(
"totalFiles"
).innerText =
totalFiles;

document.getElementById(
"totalSize"
).innerText =
(
totalBytes /
1024 /
1024
).toFixed(2)
+ " MB";

}
</script>
<script>
lucide.createIcons();
</script>
</body>
</html>
