<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes — Jagathish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* === TOKENS === */
    :root {
      --bg:          #07090f;
      --surface:     rgba(15, 20, 35, 0.85);
      --elevated:    rgba(22, 30, 52, 0.7);
      --input-bg:    rgba(12, 18, 34, 0.9);
      --accent:      #22d3ee;        /* cyan — distinct from the cloud site's blue */
      --accent-dim:  rgba(34,211,238,0.12);
      --accent-glow: rgba(34,211,238,0.3);
      --border:      rgba(34,211,238,0.1);
      --border-h:    rgba(34,211,238,0.3);
      --success:     #4ade80;
      --text:        #e2e8f0;
      --muted:       #475569;
      --radius:      12px;
      --mono:        'JetBrains Mono', monospace;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
      overflow-x: hidden;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(34,211,238,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 90%, rgba(99,102,241,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* === HEADER === */
    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      animation: fadeUp 0.4s ease both;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }

    .logo-dot {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px var(--accent-glow);
      flex-shrink: 0;
    }

    .logo-dot svg { width: 16px; height: 16px; stroke: #07090f; stroke-width: 2.5; fill: none; }

    .logo-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .logo-name span { color: var(--accent); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--success);
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.2);
      padding: 5px 11px;
      border-radius: 100px;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: livePulse 2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); opacity:1; }
      50%      { box-shadow: 0 0 0 5px rgba(74,222,128,0); opacity:0.7; }
    }

    /* === COMPOSE BOX === */
    .compose {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: fadeUp 0.45s ease 0.05s both;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .compose:focus-within {
      border-color: var(--border-h);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 3px var(--accent-dim);
    }

    .compose-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #noteInput {
      width: 100%;
      min-height: 130px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.7;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease;
    }

    #noteInput::placeholder { color: var(--muted); font-family: 'Inter', sans-serif; }
    #noteInput:focus { border-color: var(--accent); }

    .compose-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 10px;
    }

    .char-count {
      font-size: 0.75rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .create-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      background: var(--accent);
      color: #07090f;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }

    .create-btn::before {
      content: '';
      position: absolute;
      top:0; left:-70%;
      width:50%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-15deg);
      transition: left 0.5s ease;
    }

    .create-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
    .create-btn:hover::before { left: 130%; }
    .create-btn:active { transform: translateY(0) scale(0.97); }
    .create-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .create-btn svg { width:14px; height:14px; stroke:#07090f; stroke-width:2.5; fill:none; flex-shrink:0; }

    /* === DIVIDER === */
    .divider {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 20px;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    .divider-line { flex:1; height:1px; background: var(--border); }
    .divider-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      white-space: nowrap;
    }

    /* === NOTES FEED === */
    #notesFeed {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 56px 20px;
      color: var(--muted);
      animation: fadeUp 0.4s ease both;
    }

    .empty svg {
      width: 40px; height: 40px;
      stroke: var(--muted);
      opacity: 0.3;
      margin-bottom: 12px;
      fill: none;
    }

    .empty p { font-size: 0.88rem; }
    .empty small { font-size: 0.75rem; opacity: 0.6; margin-top: 4px; display: block; }

    /* === NOTE CARD === */
    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      backdrop-filter: blur(16px);
      animation: noteIn 0.35s cubic-bezier(0.34,1.2,0.64,1) both;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .note-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), #818cf8);
      border-radius: 3px 0 0 3px;
    }

    .note-card:hover {
      border-color: var(--border-h);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    @keyframes noteIn {
      from { opacity:0; transform: translateY(-10px) scale(0.98); }
      to   { opacity:1; transform: translateY(0)     scale(1); }
    }

    .note-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .note-time {
      font-size: 0.72rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .note-actions { display: flex; gap: 6px; }

    /* Copy button */
    .copy-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      background: var(--accent-dim);
      border: 1px solid var(--border-h);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .copy-btn svg { width:12px; height:12px; stroke:currentColor; stroke-width:2.5; fill:none; flex-shrink:0; }

    .copy-btn:hover {
      background: rgba(34,211,238,0.2);
      box-shadow: 0 0 12px var(--accent-glow);
      transform: translateY(-1px);
    }

    .copy-btn.copied {
      background: rgba(74,222,128,0.12);
      border-color: rgba(74,222,128,0.3);
      color: var(--success);
    }

    /* Note content — rendered as plain pre-wrap text */
    .note-content {
      font-family: var(--mono);
      font-size: 0.875rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      padding-left: 4px;
      max-height: 320px;
      overflow-y: auto;
    }

    .note-content::-webkit-scrollbar { width: 4px; }
    .note-content::-webkit-scrollbar-track { background: transparent; }
    .note-content::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 4px; }

    /* Select-all hint */
    .select-hint {
      margin-top: 10px;
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .select-hint kbd {
      font-family: var(--mono);
      font-size: 0.65rem;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--text);
    }

    /* === TOAST === */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface);
      border: 1px solid var(--border-h);
      backdrop-filter: blur(20px);
      padding: 11px 20px;
      border-radius: 100px;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* === ANIMATIONS === */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* === FOOTER === */
    footer {
      margin-top: 48px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      animation: fadeUp 0.4s ease 0.3s both;
    }

    /* === RESPONSIVE === */
    @media (max-width: 480px) {
      body { padding: 20px 12px 48px; }
      .compose { padding: 16px; }
      .note-card { padding: 14px 16px; }
      .compose-footer { flex-wrap: wrap; }
      .create-btn { width: 100%; justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 20h-7a2 2 0 01-2-2V6a2 2 0 012-2h5l2 3h7a2 2 0 012 2v2"/><path d="M18 14v4m0 4v-4m0 0h-4m4 0h4" stroke-linecap="round"/></svg>
    </div>
    <span class="logo-name">jagathish<span>.notes</span></span>
  </a>
  <div class="live-badge"><span class="live-dot"></span> Live sync</div>
</header>

<!-- Compose -->
<div class="compose">
  <div class="compose-label">New note</div>
  <textarea id="noteInput" placeholder="Paste or type anything — text, links, code…" maxlength="20000" spellcheck="false"></textarea>
  <div class="compose-footer">
    <span class="char-count"><span id="charCount">0</span> / 20,000</span>
    <button class="create-btn" id="createBtn" onclick="createNote()">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Publish note
    </button>
  </div>
</div>

<!-- Feed -->
<div class="divider">
  <div class="divider-line"></div>
  <span class="divider-label">Recent notes · auto-clears after 24 h</span>
  <div class="divider-line"></div>
</div>

<div id="notesFeed">
  <div class="empty">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <p>No notes yet</p>
    <small>Publish something above — it'll appear here instantly on every device</small>
  </div>
</div>

<footer>Notes are public · no login required · deleted after 24 hours</footer>

<div class="toast" id="toast"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =============================================
   CONFIG — reuse your existing Supabase project
   You need one table: notes (id, content, created_at)
   See setup instructions in the comments below.
   ============================================= */

const SUPABASE_URL     = "https://lhsptgfeoojuvavsqdas.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_cdCtff0oXM7b-Bv4iEJ7Kg_tMEnhr38";

/*
  SUPABASE TABLE SETUP (run once in Supabase SQL editor):
  --------------------------------------------------------
  create table notes (
    id          uuid primary key default gen_random_uuid(),
    content     text not null,
    created_at  timestamptz default now()
  );
  alter table notes enable row level security;
  create policy "anyone can read"   on notes for select using (true);
  create policy "anyone can insert" on notes for insert with check (true);

  -- Auto-delete after 24h (optional cron via pg_cron or Supabase Edge Function)
  -- Or just let them accumulate and manually clear. The UI shows last 24h only.
*/

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* === CHAR COUNT === */
const noteInput  = document.getElementById("noteInput");
const charCount  = document.getElementById("charCount");
const createBtn  = document.getElementById("createBtn");

noteInput.addEventListener("input", () => {
  charCount.textContent = noteInput.value.length.toLocaleString();
});

/* === TOAST === */
function showToast(msg, duration = 2200) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

/* === TIME FORMAT === */
function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 10)  return "just now";
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return new Date(dateStr).toLocaleDateString();
}

/* === RENDER NOTES === */
function renderNotes(notes) {
  const feed = document.getElementById("notesFeed");

  if (!notes || notes.length === 0) {
    feed.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <p>No notes yet</p>
      <small>Publish something above — it'll appear here instantly on every device</small>
    </div>`;
    return;
  }

  feed.innerHTML = "";

  notes.forEach((note, i) => {
    const card = document.createElement("div");
    card.className = "note-card";
    card.style.animationDelay = (i * 0.05) + "s";
    card.dataset.id = note.id;

    const escaped = note.content
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");

    card.innerHTML = `
      <div class="note-meta">
        <span class="note-time" data-ts="${note.created_at}">${timeAgo(note.created_at)}</span>
        <div class="note-actions">
          <button class="copy-btn" onclick="copyNote(this, ${JSON.stringify(note.content)})">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy
          </button>
        </div>
      </div>
      <div class="note-content">${escaped}</div>
      <div class="select-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;stroke:currentColor">
          <polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 01-4 4H4"/>
        </svg>
        Click inside text then <kbd>Ctrl+A</kbd> <kbd>Ctrl+C</kbd> to copy in VDI
      </div>
    `;
    feed.appendChild(card);
  });
}

/* === COPY === */
async function copyNote(btn, content) {
  const resetBtn = () => {
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
    }, 2500);
  };

  const markCopied = () => {
    btn.classList.add("copied");
    btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
    showToast("✓ Copied to clipboard");
    resetBtn();
  };

  // 1. Modern Clipboard API (works on HTTPS + desktop browsers)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try {
      await navigator.clipboard.writeText(content);
      markCopied();
      return;
    } catch (_) { /* fall through */ }
  }

  // 2. Mobile-safe: create a temporary input, select it, execCommand
  //    Must be a visible element for iOS Safari to allow selection
  const el = document.createElement("textarea");
  el.value = content;
  el.setAttribute("readonly", "");
  el.style.cssText = [
    "position:fixed",
    "top:0","left:0",
    "width:1px","height:1px",
    "padding:0","border:none",
    "outline:none","box-shadow:none",
    "background:transparent",
    "opacity:0.01",   /* NOT 0 — iOS won't select invisible elements */
    "font-size:16px"  /* prevent iOS zoom on focus */
  ].join(";");
  document.body.appendChild(el);

  // iOS needs a range-based selection
  if (navigator.userAgent.match(/ipad|iphone/i)) {
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    el.setSelectionRange(0, el.value.length);
  } else {
    el.focus();
    el.select();
  }

  try {
    const ok = document.execCommand("copy");
    if (ok) { markCopied(); } else { showToast("⌨ Long-press the text to copy"); }
  } catch (_) {
    showToast("⌨ Long-press the text to copy");
  }
  document.body.removeChild(el);
}

/* === CREATE NOTE === */
async function createNote() {
  const content = noteInput.value.trim();
  if (!content) { showToast("Type something first"); return; }

  createBtn.disabled = true;
  createBtn.innerHTML = `<svg viewBox="0 0 24 24" style="animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Publishing…`;

  const { error } = await db.from("notes").insert([{ content }]);

  createBtn.disabled = false;
  createBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Publish note`;

  if (error) { showToast("⚠ " + error.message); return; }

  noteInput.value = "";
  charCount.textContent = "0";
  showToast("✓ Note published — visible on all devices");
}

/* === LOAD NOTES (last 24h, newest first) === */
async function loadNotes() {
  const since = new Date(Date.now() - 24*60*60*1000).toISOString();
  const { data, error } = await db
    .from("notes")
    .select("*")
    .gte("created_at", since)
    .order("created_at", { ascending: false })
    .limit(50);

  if (error) { showToast("Could not load notes"); return; }
  renderNotes(data);
}

/* === REAL-TIME SUBSCRIPTION === */
db.channel("notes-live")
  .on("postgres_changes", { event: "INSERT", schema: "public", table: "notes" }, payload => {
    // Prepend new note without full reload
    const feed = document.getElementById("notesFeed");
    const empty = feed.querySelector(".empty");
    if (empty) empty.remove();

    const note = payload.new;
    const card = document.createElement("div");
    card.className = "note-card";
    card.dataset.id = note.id;

    const escaped = note.content
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");

    card.innerHTML = `
      <div class="note-meta">
        <span class="note-time" data-ts="${note.created_at}">just now</span>
        <div class="note-actions">
          <button class="copy-btn" onclick="copyNote(this, ${JSON.stringify(note.content)})">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy
          </button>
        </div>
      </div>
      <div class="note-content">${escaped}</div>
      <div class="select-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;stroke:currentColor">
          <polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 01-4 4H4"/>
        </svg>
        Click inside text then <kbd>Ctrl+A</kbd> <kbd>Ctrl+C</kbd> to copy in VDI
      </div>
    `;

    feed.insertBefore(card, feed.firstChild);
    showToast("✦ New note appeared");
  })
  .subscribe();

/* === RELATIVE TIME REFRESH === */
setInterval(() => {
  document.querySelectorAll(".note-time[data-ts]").forEach(el => {
    el.textContent = timeAgo(el.dataset.ts);
  });
}, 30000);

/* === SPIN KEYFRAME === */
const style = document.createElement("style");
style.textContent = "@keyframes spin { to { transform: rotate(360deg); } }";
document.head.appendChild(style);

/* === INIT === */
loadNotes();
</script>
</body>
</html>
